<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 360" width="240" height="360">
  <defs>
    <linearGradient id="a-skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0c8a0"/>
      <stop offset="100%" stop-color="#b08866"/>
    </linearGradient>
    <linearGradient id="a-skin-shadow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="a-hoodie" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a5a64"/>
      <stop offset="100%" stop-color="#2e2e36"/>
    </linearGradient>
    <linearGradient id="a-hoodie-accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="a-jeans" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b5871"/>
      <stop offset="100%" stop-color="#1d2c39"/>
    </linearGradient>
    <linearGradient id="a-hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b3a1f"/>
      <stop offset="100%" stop-color="#4a1d0e"/>
    </linearGradient>
    <radialGradient id="a-shadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#000" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ombre au sol -->
  <ellipse cx="120" cy="348" rx="65" ry="8" fill="url(#a-shadow)"/>

  <!-- Queue de cheval (derrière la tête) -->
  <path d="M 142 75 Q 165 95 162 130 Q 158 140 152 138 Q 148 125 144 110 Z" fill="url(#a-hair)"/>

  <!-- Jambes (jean) -->
  <path d="M 94 245 L 88 345 L 112 345 L 117 250 Z" fill="url(#a-jeans)"/>
  <path d="M 123 250 L 128 345 L 152 345 L 146 245 Z" fill="url(#a-jeans)"/>

  <!-- Couture jean centrale -->
  <line x1="102" y1="260" x2="98" y2="340" stroke="#fff" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="138" y1="260" x2="142" y2="340" stroke="#fff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Sneakers -->
  <ellipse cx="100" cy="346" rx="15" ry="6" fill="#f5f1e8"/>
  <ellipse cx="140" cy="346" rx="15" ry="6" fill="#f5f1e8"/>
  <rect x="86" y="343" width="28" height="3" fill="#fbbf24"/>
  <rect x="126" y="343" width="28" height="3" fill="#fbbf24"/>

  <!-- Bras -->
  <path d="M 62 145 Q 56 200 62 250 L 76 250 Q 72 205 78 145 Z" fill="url(#a-hoodie)"/>
  <path d="M 162 145 Q 168 205 174 250 L 160 250 Q 168 200 162 145 Z" fill="url(#a-hoodie)"/>

  <!-- Mains dans poches façon hoodie : juste les manches resserrées -->
  <rect x="62" y="240" width="16" height="12" rx="6" fill="#2e2e36"/>
  <rect x="158" y="240" width="16" height="12" rx="6" fill="#2e2e36"/>

  <!-- Sweat à capuche : corps -->
  <path d="M 78 142 Q 82 134 92 132 L 148 132 Q 158 134 162 142 L 162 250 Q 160 258 150 258 L 90 258 Q 80 258 78 250 Z"
        fill="url(#a-hoodie)"/>

  <!-- Poche kangourou -->
  <path d="M 92 200 Q 92 230 100 240 L 140 240 Q 148 230 148 200 L 145 198 Q 145 226 138 232 L 102 232 Q 95 226 95 198 Z"
        fill="#000" fill-opacity="0.18"/>

  <!-- Cordons capuche -->
  <line x1="113" y1="155" x2="113" y2="180" stroke="#f5f1e8" stroke-width="2" stroke-linecap="round"/>
  <line x1="127" y1="155" x2="127" y2="180" stroke="#f5f1e8" stroke-width="2" stroke-linecap="round"/>
  <circle cx="113" cy="183" r="2.5" fill="url(#a-hoodie-accent)"/>
  <circle cx="127" cy="183" r="2.5" fill="url(#a-hoodie-accent)"/>

  <!-- Capuche au repos sur les épaules -->
  <path d="M 78 142 Q 80 120 100 118 L 140 118 Q 160 120 162 142 L 162 152 Q 158 138 140 136 L 100 136 Q 82 138 78 152 Z"
        fill="#2a2a30"/>

  <!-- Cou -->
  <rect x="111" y="112" width="18" height="22" fill="url(#a-skin)"/>
  <rect x="111" y="112" width="18" height="22" fill="url(#a-skin-shadow)"/>

  <!-- Tête -->
  <ellipse cx="120" cy="92" rx="31" ry="36" fill="url(#a-skin)"/>
  <ellipse cx="120" cy="92" rx="31" ry="36" fill="url(#a-skin-shadow)"/>

  <!-- Cheveux : avant + frange -->
  <path d="M 90 80 Q 92 52 120 50 Q 148 52 150 80 L 145 90 Q 140 70 120 68 Q 100 70 95 90 Z"
        fill="url(#a-hair)"/>
  <!-- Frange -->
  <path d="M 99 78 Q 110 72 125 76 Q 130 85 122 90 Q 110 92 100 88 Z" fill="url(#a-hair)"/>

  <!-- Yeux -->
  <ellipse cx="108" cy="95" rx="2.2" ry="2.6" fill="#1a1a1e"/>
  <ellipse cx="132" cy="95" rx="2.2" ry="2.6" fill="#1a1a1e"/>

  <!-- Sourcils -->
  <path d="M 102 87 Q 108 85 114 87" stroke="#1a1a1e" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M 126 87 Q 132 85 138 87" stroke="#1a1a1e" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Nez subtle -->
  <path d="M 120 99 Q 118 107 120 112" stroke="#000" stroke-opacity="0.15" stroke-width="1.5" fill="none"/>

  <!-- Bouche petit sourire -->
  <path d="M 112 118 Q 120 122 128 118" stroke="#7a3520" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Boucle d'oreille -->
  <circle cx="92" cy="100" r="2" fill="url(#a-hoodie-accent)"/>
</svg>
